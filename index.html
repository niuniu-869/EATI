<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EATI 食格测试 · 你是哪种吃货？</title>
  <meta name="description" content="MBTI 测不准你的灵魂，但 EATI 能测出你的胃。厦门大学美食协会出品的 25 题吃货人格测试。" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍜</text></svg>" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">
    <!-- 首页 -->
    <section id="page-intro" class="page active">
      <div class="card intro-card">
        <h1 class="intro-title">MBTI 测不准你的灵魂，<br/>但 EATI 能测出你的胃。</h1>
        <p class="intro-sub">25 题 · 6 维度 · 23 种人格 · 2 个隐藏彩蛋</p>
        <p class="intro-hint">你可能是：饕餮 / 小鸟胃 / 精致拍照党 / 夜宵教徒 / 情绪化进食 / 减肥诈骗犯 / 火锅教祖 / ……</p>
        <button id="btn-start" class="btn btn-primary">开始测试</button>
        <p class="intro-credit">开源项目 · 致敬 B 站 UP 主 @蛆肉儿串儿 的原创 SBTI</p>
        <p class="intro-note">本测试仅供娱乐</p>
      </div>
    </section>

    <!-- 答题页 -->
    <section id="page-quiz" class="page">
      <div class="card quiz-card">
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <div class="progress-text" id="progress-text">0 / 25</div>
        <div class="question-area">
          <p class="question-text" id="question-text"></p>
        </div>
        <div class="options" id="options"></div>
      </div>
    </section>

    <!-- 结果页 -->
    <section id="page-result" class="page">
      <div class="card result-card" id="result-card">
        <div class="result-kicker" id="result-kicker">你的主食格</div>
        <div class="result-code" id="result-code"></div>
        <div class="result-name" id="result-name"></div>
        <div class="result-badge" id="result-badge"></div>
        <div class="result-intro" id="result-intro"></div>
        <div class="result-desc" id="result-desc"></div>

        <div class="result-secondary" id="result-secondary" style="display:none">
          <div class="secondary-label">您的实际标准匹配</div>
          <div class="secondary-info" id="secondary-info"></div>
        </div>

        <h3 class="section-title">六维食格画像</h3>
        <canvas id="radar-chart" width="320" height="320"></canvas>
        <div class="dimensions-detail" id="dimensions-detail"></div>

        <div class="result-top3">
          <h3 class="section-title">最佳匹配 TOP 5</h3>
          <div id="top-list"></div>
        </div>

        <div class="disclaimer" id="disclaimer"></div>

        <div class="result-actions">
          <button id="btn-copy" class="btn btn-primary">复制朋友圈文案</button>
          <button id="btn-download" class="btn btn-secondary">保存分享图片</button>
          <button id="btn-restart" class="btn btn-secondary">重新测试</button>
        </div>
        <p class="copy-hint" id="copy-hint" style="display:none">已复制，去朋友圈或群里粘贴发送</p>
      </div>
    </section>

    <!-- 美协页脚小广告 -->
    <footer class="site-footer">
      本测试由 <strong>厦门大学美食协会</strong> 出品 · 一个吃遍厦门的学生社团 · 开源于 <a href="https://github.com/niuniu-869/EATI" target="_blank" rel="noopener">GitHub</a>
    </footer>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
